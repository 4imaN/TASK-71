# nginx config for the E2E test environment.
#
# HTTP-only (no TLS) so Playwright can reach the app without certificate trust
# issues inside Docker.  SESSION_SECURE_COOKIE=false must be set in app env
# to match this HTTP-only setup.
#
# This file is used exclusively by docker-compose.e2e.yml — never in
# production or the standard test stack.

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
