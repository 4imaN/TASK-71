# Research Services Reservation & Catalog System
# Primary runtime command: docker compose up --build
#
# Port strategy: nginx exposes ONLY the HTTPS surface on the host.
#   Default: https://localhost:8443  (override: HTTPS_PORT=443 docker compose up --build)
# HTTP port 80 is handled internally by nginx (HTTP→HTTPS redirect) and is
# NOT bound to the host — this keeps the default collision-resistant on shared
# machines where 80/443 may already be in use by other projects.
#
# All secret values (APP_KEY, DB_PASSWORD, REDIS_PASSWORD, APP_ENCRYPTION_KEY)
# are generated by the bootstrap service into the runtime_config named volume.
# No secrets appear in this file. Static non-secret config is set inline.
# See docker/compose.env.required for the list of generated keys.
#
# Internal TLS: the bootstrap service generates an internal CA and issues
# service certificates for postgres and redis.  All app↔database and
# app↔redis connections within the Docker network use TLS in transit.

services:

  # ── Bootstrap ───────────────────────────────────────────────────────────────
  # Generates runtime secrets into the runtime_config volume, then exits.
  # All other services depend on this completing successfully.
  # Idempotent: skips generation if config already present on the volume.
  bootstrap:
    build:
      context: .
      target: bootstrap
    volumes:
      - runtime_config:/runtime
    restart: "no"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  # TLS enabled: the bootstrap service generates a CA-signed server cert.
  # command: overrides launch args to enable ssl with certs from /runtime/certs.
  postgres:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/runtime/certs/postgres.crt"
      - "-c"
      - "ssl_key_file=/runtime/certs/postgres.key.pg"
      - "-c"
      - "ssl_ca_file=/runtime/certs/ca.crt"
    environment:
      POSTGRES_DB:            researchsvc
      POSTGRES_USER:          researchsvc
      POSTGRES_PASSWORD_FILE: /runtime/db_password
    volumes:
      - runtime_config:/runtime:ro
      - postgres_data:/var/lib/postgresql/data
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchsvc -d researchsvc"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  # TLS enabled via bootstrap-generated redis.conf (tls-port 6379, port 0).
  redis:
    image: redis:7-alpine
    command: redis-server /runtime/redis.conf
    volumes:
      - runtime_config:/runtime:ro
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      # Use --tls and --cacert for TLS-enabled Redis healthcheck
      test: ["CMD-SHELL", "redis-cli --tls --cacert /runtime/certs/ca.crt -a \"$(grep requirepass /runtime/redis.conf | awk '{print $2}')\" ping 2>/dev/null | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  # ── Application (PHP-FPM) ────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: app
    environment:
      APP_ENV:          production
      APP_DEBUG:        "false"
      APP_URL:          "https://localhost:${HTTPS_PORT:-8443}"
      DB_CONNECTION:    pgsql
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_DATABASE:      researchsvc
      DB_USERNAME:      researchsvc
      DB_SSLMODE:       verify-ca
      DB_SSLROOTCERT:   /runtime/certs/ca.crt
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      REDIS_SCHEME:     tls
      REDIS_TLS_CA:     /runtime/certs/ca.crt
      SESSION_DRIVER:   redis
      QUEUE_CONNECTION: redis
      CACHE_STORE:      redis
      LOG_CHANNEL:      stderr
      LOG_LEVEL:        warning
    volumes:
      - runtime_config:/runtime:ro
      - app_storage:/var/www/html/storage
      - app_public:/shared_public
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx ────────────────────────────────────────────────────────────────────
  # Only the HTTPS port is bound to the host.  Default is 8443 so the stack
  # starts cleanly on machines where 443 is already in use.
  # Override: HTTPS_PORT=443 docker compose up --build
  # The app_public volume shares built CSS/JS assets from the app container
  # so nginx can serve them directly without proxying through PHP-FPM.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - runtime_config:/runtime:ro
      - app_public:/var/www/html/public:ro  # Built CSS/JS assets copied by app entrypoint
    depends_on:
      - app

  # ── Queue Worker ─────────────────────────────────────────────────────────────
  queue-worker:
    build:
      context: .
      target: app
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=90
    environment:
      APP_ENV:          production
      APP_DEBUG:        "false"
      DB_CONNECTION:    pgsql
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_DATABASE:      researchsvc
      DB_USERNAME:      researchsvc
      DB_SSLMODE:       verify-ca
      DB_SSLROOTCERT:   /runtime/certs/ca.crt
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      REDIS_SCHEME:     tls
      REDIS_TLS_CA:     /runtime/certs/ca.crt
      QUEUE_CONNECTION: redis
      CACHE_STORE:      redis
      LOG_CHANNEL:      stderr
      LOG_LEVEL:        warning
    volumes:
      - runtime_config:/runtime:ro
      - app_storage:/var/www/html/storage
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      target: app
    command: php artisan schedule:work
    environment:
      APP_ENV:          production
      APP_DEBUG:        "false"
      DB_CONNECTION:    pgsql
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_DATABASE:      researchsvc
      DB_USERNAME:      researchsvc
      DB_SSLMODE:       verify-ca
      DB_SSLROOTCERT:   /runtime/certs/ca.crt
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      REDIS_SCHEME:     tls
      REDIS_TLS_CA:     /runtime/certs/ca.crt
      QUEUE_CONNECTION: redis
      CACHE_STORE:      redis
      LOG_CHANNEL:      stderr
      LOG_LEVEL:        warning
    volumes:
      - runtime_config:/runtime:ro
      - app_storage:/var/www/html/storage
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  runtime_config:   # Generated secrets; persists across restarts; destroyed by down -v
  postgres_data:
  app_storage:
  app_public:       # Built CSS/JS assets shared between app and nginx containers
